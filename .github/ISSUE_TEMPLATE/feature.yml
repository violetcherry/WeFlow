name: "全新功能请求"
description: "提议一个目前项目中完全没有的新特性"
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为项目提供新想法！详细的需求描述能极大地增加该功能被采纳的几率。
  - type: textarea
    id: motivation
    attributes:
      label: 需求背景 / 动机
      description: 为什么需要这个功能？你目前遇到了什么痛点？
      placeholder: 目前我在做...事情时，必须手动处理，非常不方便。如果能有...功能就太好了。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 请详细描述你希望这个新功能是什么样的，它是如何工作的？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 (可选)
      description: 你目前在使用什么临时的替代方案？或者你有没有考虑过其他的实现方式？
  - type: checkboxes
    id: help-wanted
    attributes:
      label: 参与贡献
      options:
        - label: 我有能力且愿意提交 Pull Request 来实现这个功能！(我们会为你打上 `help wanted` 标签)
